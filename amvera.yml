meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"

build:
  additionalCommands: curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs && cd frontend && npm install && npm run build && cd ..

run:
  command: uvicorn backend.main:app --host 0.0.0.0 --port 80
  persistenceMount: /data
  containerPort: 80
  env:
    SNAPSHOTS_DIR: /data/snapshots
    DATABASE_URL: sqlite:////data/smartproctor.db
