meta:
  environments:
    - environment: node
      toolchain:
        name: npm
        version: "20"
      buildFirst: true
    - environment: python
      toolchain:
        name: pip
        version: "3.11"

build:
  - cd frontend && npm install && npm run build
  - pip install -r requirements.txt

run:
  command: uvicorn backend.main:app --host 0.0.0.0 --port 8080
  persistenceMount: /data
  env:
    SNAPSHOTS_DIR: /data/snapshots
    DATABASE_URL: sqlite:////data/smartproctor.db
    # JWT_SECRET_KEY задаётся в переменных окружения проекта Amvera (UI), а не здесь
