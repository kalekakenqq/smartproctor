meta:
  environment: python
  toolchain: node

build:
  command: cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt
  version: "3.11"
  nodeVersion: "20"

run:
  command: uvicorn backend.main:app --host 0.0.0.0 --port 80
  persistenceMount: /data
  containerPort: 80
  env:
    SNAPSHOTS_DIR: /data/snapshots
    DATABASE_URL: sqlite:////data/smartproctor.db
